# render.yaml — Render Blueprint for Gravity HRMS
# This file tells Render how to deploy the backend and frontend

services:
  # ─── Backend API (Node.js) ───
  - type: web
    name: gravity-hrms-api
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false  # Set manually in Render dashboard
      - key: JWT_SECRET
        sync: false
      - key: JWT_LIFETIME
        value: 1d
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_SECURE
        value: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: FRONTEND_URL
        sync: false  # Set to your Render frontend URL after deploy
      - key: ENABLE_EMAIL_NOTIFICATIONS
        value: true
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: AI_PROVIDER
        value: openrouter
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: nvidia/llama-3.3-nemotron-super-49b-v1.5
      - key: AI_ENABLED
        value: true
      - key: AI_MAX_TOKENS
        value: 2000
      - key: AI_TEMPERATURE
        value: 0.3

  # ─── Frontend (Static Site via Vite Build) ───
  - type: web
    name: gravity-hrms-frontend
    runtime: static
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false  # Set to your backend Render URL, e.g. https://gravity-hrms-api.onrender.com/api
