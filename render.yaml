services:
  - type: web
    name: gravity-hrms-api
    env: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_LIFETIME
        value: 1d
      - key: CORS_ORIGIN
        value: https://gravity-hrms.onrender.com
      - key: FRONTEND_URL
        value: https://gravity-hrms.onrender.com
      - key: VITE_API_BASE_URL
        value: https://gravity-hrms.onrender.com/api
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: ENABLE_EMAIL_NOTIFICATIONS
        value: false
      - key: AI_PROVIDER
        value: nvidia
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: nvidia/nemotron-3-ultra-550b-a55b
      - key: AI_ENABLED
        value: true
      - key: AI_MAX_TOKENS
        value: 1024
      - key: AI_TEMPERATURE
        value: 1
      - key: AI_API_BASE_URL
        value: https://integrate.api.nvidia.com/v1
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
